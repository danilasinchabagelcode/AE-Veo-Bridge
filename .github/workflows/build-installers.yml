name: Build Installers

on:
  workflow_dispatch:
    inputs:
      build_pkg:
        description: "Build macOS .pkg"
        required: false
        type: boolean
        default: true

jobs:
  build-zxp:
    name: Build ZXP (macOS)
    runs-on: macos-latest
    env:
      CI_CERT_PASSWORD: ${{ secrets.ZXP_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ZXPSignCMD
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          TMP="$(mktemp -d)"
          git clone --depth 1 --filter=blob:none --sparse "https://github.com/Adobe-CEP/CEP-Resources.git" "$TMP/cep-resources"
          cd "$TMP/cep-resources"
          git sparse-checkout set "ZXPSignCMD/4.1.3"
          ROOT="$TMP/cep-resources"
          BIN="$(find "$ROOT/ZXPSignCMD/4.1.3" -type f -name 'ZXPSignCMD' ! -name '*.exe' | head -n 1)"
          if [[ -z "${BIN:-}" ]]; then
            BIN="$(find "$ROOT/ZXPSignCMD/4.1.3" -type f -name 'ZXPSignCmd' ! -name '*.exe' | head -n 1)"
          fi
          if [[ -z "${BIN:-}" ]]; then
            echo "ZXPSignCMD binary not found in CEP-Resources/ZXPSignCMD/4.1.3"
            exit 1
          fi
          install -m 755 "$BIN" "$HOME/.local/bin/ZXPSignCMD"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # ZXPSignCMD may return non-zero on help/usage; do not fail the job here.
          set +e
          "$HOME/.local/bin/ZXPSignCMD" -h > "$TMP/zxpsign-help.txt" 2>&1
          if [[ ! -s "$TMP/zxpsign-help.txt" ]]; then
            "$HOME/.local/bin/ZXPSignCMD" > "$TMP/zxpsign-help.txt" 2>&1
          fi
          set -e
          head -n 5 "$TMP/zxpsign-help.txt" || true

      - name: Prepare ZXP build config
        shell: bash
        run: |
          set -euo pipefail
          CERT_PASSWORD="${CI_CERT_PASSWORD:-veobridge-ci-temp-password}"
          cat > .zxp-build.env <<CFG
          ZXPSIGN_CMD=$HOME/.local/bin/ZXPSignCMD
          CERT_PATH=$GITHUB_WORKSPACE/.certs/VeoBridgeCert.p12
          CERT_PASSWORD=${CERT_PASSWORD}
          CERT_COUNTRY=US
          CERT_STATE=NA
          CERT_COMMON_NAME=Veo Bridge CI
          CERT_ORG=Veo Bridge
          CERT_ORG_UNIT=CI
          CFG
          echo "Prepared .zxp-build.env"
          sed -n '1,40p' .zxp-build.env | sed 's/CERT_PASSWORD=.*/CERT_PASSWORD=***hidden***/'

      - name: Build ZXP
        shell: bash
        run: bash -x scripts/build-zxp.sh

      - name: Upload ZXP artifact
        uses: actions/upload-artifact@v4
        with:
          name: veobridge-zxp
          path: dist/*.zxp
          if-no-files-found: error

      - name: ZXP diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "---- pwd ----"
          pwd
          echo "---- ls ----"
          ls -la
          echo "---- dist ----"
          ls -la dist || true
          echo "---- certs ----"
          ls -la .certs || true
          echo "---- zxp env ----"
          sed -n '1,80p' .zxp-build.env | sed 's/CERT_PASSWORD=.*/CERT_PASSWORD=***hidden***/' || true

  build-msi:
    name: Build MSI (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WiX Toolset v3
        shell: powershell
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP "wix311.zip"
          $wixDir = Join-Path $env:RUNNER_TEMP "wix311"
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile $tmp
          if (Test-Path $wixDir) {
            Remove-Item -Recurse -Force -Path $wixDir
          }
          Expand-Archive -Path $tmp -DestinationPath $wixDir -Force
          if (!(Test-Path (Join-Path $wixDir "heat.exe"))) {
            throw "WiX binaries were not extracted correctly: $wixDir"
          }
          "$wixDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify WiX tools
        shell: powershell
        run: |
          Get-Command heat.exe | Out-String | Write-Host
          Get-Command candle.exe | Out-String | Write-Host
          Get-Command light.exe | Out-String | Write-Host

      - name: Build MSI
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-msi.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: veobridge-msi
          path: dist/*.msi
          if-no-files-found: error

      - name: MSI diagnostics on failure
        if: failure()
        shell: powershell
        run: |
          Write-Host "---- pwd ----"
          Get-Location | Out-String | Write-Host
          Write-Host "---- ls ----"
          Get-ChildItem -Force | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host "---- dist ----"
          if (Test-Path .\dist) { Get-ChildItem .\dist -Force | Format-Table -AutoSize | Out-String | Write-Host } else { Write-Host "dist missing" }

  build-pkg:
    name: Build PKG (macOS)
    if: ${{ inputs.build_pkg }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PKG
        shell: bash
        run: bash scripts/build-pkg.sh

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: veobridge-pkg
          path: dist/*.pkg
          if-no-files-found: error
