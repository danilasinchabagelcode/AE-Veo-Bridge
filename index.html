<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Bridge</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main class="container panel-root launcher-root">
        <section class="card launcher-card">
            <div class="toolbar launcher-toolbar">
                <button id="btnCreateComp" type="button" class="launcher-icon-btn" aria-label="Create helper composition" title="Create helper composition"><span class="launcher-icon">+</span></button>
                <button id="btnCapture" type="button" class="launcher-action-btn" title="Capture current AE frame into VeoBridge library">Capture</button>
                <button id="btnOpenGallery" type="button" class="launcher-action-btn" title="Open VeoBridge Gallery">Gallery</button>
                <button id="btnSettings" type="button" class="launcher-icon-btn" aria-label="Settings" title="Settings"><span class="launcher-icon">&#9881;</span></button>
            </div>
        </section>

        <p id="statusLine" class="status-line">Ready.</p>
    </main>

    <div id="settingsModal" class="modal-backdrop" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <h2 id="settingsTitle" class="modal-title">Settings</h2>
            <label for="apiKeyInput" class="field-label">API key</label>
            <input id="apiKeyInput" type="password" placeholder="Enter Gemini API key">
            <div class="modal-actions">
                <button id="btnCloseSettings" type="button">Close</button>
                <button id="btnSaveApiKey" type="button" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <div id="createCompModal" class="modal-backdrop" hidden>
        <div class="modal-card create-comp-card" role="dialog" aria-modal="true" aria-labelledby="createCompTitle">
            <h2 id="createCompTitle" class="modal-title">Create Composition</h2>
            <div class="create-comp-inline-row">
                <select id="ratioSelect" class="create-comp-inline-control" aria-label="Ratio" title="Ratio">
                    <option value="16x9" selected>16x9</option>
                    <option value="1x1">1x1</option>
                    <option value="9x16">9x16</option>
                </select>

                <select id="bgColorSelect" class="create-comp-inline-control" aria-label="Background color" title="Background color">
                    <option value="Green" selected>Green</option>
                    <option value="Blue">Blue</option>
                    <option value="Magenta">Magenta</option>
                    <option value="Custom">Custom</option>
                </select>

                <button id="btnColorSwatch" type="button" class="create-comp-color-swatch" aria-label="Background color" title="Background color"></button>
                <button id="btnSubmitCreateComp" type="button" class="btn-primary">Create</button>
            </div>
            <div id="createCompColorPopover" class="create-comp-color-popover" hidden>
                <div class="create-comp-picker-layout">
                    <div class="create-comp-picker-canvases">
                        <canvas id="createCompSvCanvas" class="create-comp-sv-canvas" width="168" height="154"></canvas>
                        <canvas id="createCompHueCanvas" class="create-comp-hue-canvas" width="14" height="154"></canvas>
                    </div>
                    <div class="create-comp-picker-side">
                        <div id="createCompColorPreview" class="create-comp-color-preview"></div>
                        <div class="create-comp-color-fields">
                            <div class="create-comp-color-field-row">
                                <label for="bgColorHInput" class="field-label create-comp-popover-label">H</label>
                                <input id="bgColorHInput" class="create-comp-number-input" type="text" inputmode="numeric" value="120">
                            </div>
                            <div class="create-comp-color-field-row">
                                <label for="bgColorSInput" class="field-label create-comp-popover-label">S</label>
                                <input id="bgColorSInput" class="create-comp-number-input" type="text" inputmode="numeric" value="100">
                            </div>
                            <div class="create-comp-color-field-row">
                                <label for="bgColorVInput" class="field-label create-comp-popover-label">B</label>
                                <input id="bgColorVInput" class="create-comp-number-input" type="text" inputmode="numeric" value="100">
                            </div>
                            <div class="create-comp-color-field-row">
                                <label for="bgColorRInput" class="field-label create-comp-popover-label">R</label>
                                <input id="bgColorRInput" class="create-comp-number-input" type="text" inputmode="numeric" value="0">
                            </div>
                            <div class="create-comp-color-field-row">
                                <label for="bgColorGInput" class="field-label create-comp-popover-label">G</label>
                                <input id="bgColorGInput" class="create-comp-number-input" type="text" inputmode="numeric" value="255">
                            </div>
                            <div class="create-comp-color-field-row">
                                <label for="bgColorBInput" class="field-label create-comp-popover-label">B</label>
                                <input id="bgColorBInput" class="create-comp-number-input" type="text" inputmode="numeric" value="0">
                            </div>
                        </div>
                        <div class="create-comp-color-hex-row">
                            <span class="create-comp-color-hash">#</span>
                            <input id="bgColorHexInput" type="text" value="00FF00" maxlength="6" spellcheck="false">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/csinterface-lite.js"></script>
    <script src="./js/sharedState.js"></script>
    <script src="./js/settingsStore.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
