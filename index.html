<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Bridge</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main class="container panel-root launcher-root">
        <h1 class="title">Veo Bridge</h1>

        <section class="card launcher-card">
            <div class="toolbar launcher-toolbar">
                <button id="btnCreateComp" type="button" class="launcher-icon-btn" aria-label="Create helper composition" title="Create helper composition"><span class="launcher-icon">+</span></button>
                <button id="btnCapture" type="button" class="launcher-action-btn">Capture</button>
                <button id="btnOpenGallery" type="button" class="launcher-action-btn">Gallery</button>
                <button id="btnSettings" type="button" class="launcher-icon-btn" aria-label="Settings" title="Settings"><span class="launcher-icon">&#9881;</span></button>
            </div>
            <p class="muted-note">Use Gallery for Start/End setup, prompt, generation, and video import.</p>
        </section>

        <p id="statusLine" class="status-line">Ready.</p>
    </main>

    <div id="settingsModal" class="modal-backdrop" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <h2 id="settingsTitle" class="modal-title">Settings</h2>
            <label for="apiKeyInput" class="field-label">API key</label>
            <input id="apiKeyInput" type="password" placeholder="Enter Gemini API key">
            <div class="modal-actions">
                <button id="btnCloseSettings" type="button">Close</button>
                <button id="btnSaveApiKey" type="button" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <div id="createCompModal" class="modal-backdrop" hidden>
        <div class="modal-card create-comp-card" role="dialog" aria-modal="true" aria-labelledby="createCompTitle">
            <h2 id="createCompTitle" class="modal-title">Create Composition</h2>
            <div class="create-comp-inline-row">
                <label for="ratioSelect" class="field-label create-comp-inline-label">Ratio</label>
                <select id="ratioSelect" class="create-comp-inline-control">
                    <option value="16x9" selected>16x9</option>
                    <option value="1x1">1x1</option>
                    <option value="9x16">9x16</option>
                </select>

                <label for="bgColorSelect" class="field-label create-comp-inline-label">BG Color</label>
                <select id="bgColorSelect" class="create-comp-inline-control">
                    <option value="Green" selected>Green</option>
                    <option value="Blue">Blue</option>
                    <option value="Magenta">Magenta</option>
                    <option value="Custom">Custom</option>
                </select>

                <button id="btnColorSwatch" type="button" class="create-comp-color-swatch" aria-label="Background color"></button>
                <button id="btnSubmitCreateComp" type="button" class="btn-primary">Create</button>
            </div>
            <div id="createCompColorPopover" class="create-comp-color-popover" hidden>
                <div class="create-comp-color-popover-row">
                    <label for="bgColorHexInput" class="field-label create-comp-popover-label">Hex</label>
                    <input id="bgColorHexInput" type="text" value="#00ff00" maxlength="7" spellcheck="false">
                </div>
                <div class="create-comp-color-popover-row create-comp-rgb-row">
                    <label for="bgColorRInput" class="field-label create-comp-popover-label">R</label>
                    <input id="bgColorRInput" type="number" min="0" max="255" value="0">
                    <label for="bgColorGInput" class="field-label create-comp-popover-label">G</label>
                    <input id="bgColorGInput" type="number" min="0" max="255" value="255">
                    <label for="bgColorBInput" class="field-label create-comp-popover-label">B</label>
                    <input id="bgColorBInput" type="number" min="0" max="255" value="0">
                </div>
                <div class="create-comp-color-presets">
                    <button type="button" class="create-comp-color-chip" data-color-hex="#00ff00" title="Green"></button>
                    <button type="button" class="create-comp-color-chip" data-color-hex="#0000ff" title="Blue"></button>
                    <button type="button" class="create-comp-color-chip" data-color-hex="#ff00ff" title="Magenta"></button>
                    <button id="btnApplyCustomColor" type="button" class="btn-primary">Apply</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/csinterface-lite.js"></script>
    <script src="./js/sharedState.js"></script>
    <script src="./js/settingsStore.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
