<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo Bridge Gallery</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="gallery-flow">
    <main class="container gallery-root">
        <header class="gallery-topbar">
            <div class="gallery-title-wrap">
                <h1 class="title">Veo Bridge Studio</h1>
            </div>
            <div class="gallery-topbar-actions">
                <button id="btnCleanup" type="button">Cleanup...</button>
                <button id="btnUndoDelete" type="button" disabled>Undo Delete</button>
                <button id="btnClose" type="button">Close</button>
            </div>
        </header>

        <section id="panelVideo" class="tab-panel flow-panel" data-panel-kind="studio">
            <div id="videoLeftStack" class="flow-stack">
                <div class="flow-stage">
                    <div id="videosList" class="items-grid-scroll flow-media-stream" tabindex="0"></div>
                </div>

                <section id="videoGenerateBlock" class="flow-composer card">
                    <div id="videoModeHint" class="flow-hint ghost-hidden" hidden>Frames mode: no Start/End = Text-to-Video, Start only = Image-to-Video, Start+End = Interpolation.</div>

                    <div id="videoStartEndRow" class="start-end-row flow-start-end-row">
                        <div id="videoStartCard" class="frame-card compact">
                            <button id="btnOpenVideoStartPicker" type="button" class="frame-click-cover" aria-label="Pick Start frame"></button>
                            <button id="btnClearStart" type="button" class="frame-clear-btn" title="Clear Start" aria-label="Clear Start">×</button>
                            <div class="frame-thumb frame-thumb-empty" id="galleryStartThumbWrap">
                                <img id="galleryStartThumb" alt="Start frame" hidden>
                                <span>Start</span>
                            </div>
                            <div>
                                <div class="frame-card-title">Start</div>
                                <div class="frame-card-meta" id="galleryStartLabel">Not selected</div>
                            </div>
                        </div>
                        <button id="btnSwapStartEnd" type="button" class="frame-link frame-swap-btn" title="Swap Start and End" aria-label="Swap Start and End">
                            <span class="frame-swap-icon" aria-hidden="true">&#8646;</span>
                        </button>
                        <div id="videoEndCard" class="frame-card compact">
                            <button id="btnOpenVideoEndPicker" type="button" class="frame-click-cover" aria-label="Pick End frame"></button>
                            <button id="btnClearEnd" type="button" class="frame-clear-btn" title="Clear End" aria-label="Clear End">×</button>
                            <div class="frame-thumb frame-thumb-empty" id="galleryEndThumbWrap">
                                <img id="galleryEndThumb" alt="End frame" hidden>
                                <span>End</span>
                            </div>
                            <div>
                                <div class="frame-card-title">End</div>
                                <div class="frame-card-meta" id="galleryEndLabel">Not selected</div>
                            </div>
                        </div>
                    </div>

                    <section id="videoRefsBlock" class="flow-inline-block" hidden>
                        <div class="flow-inline-actions ghost-hidden" hidden>
                            <button id="btnOpenVideoRefPicker" type="button" class="flow-plus-btn ghost-hidden" aria-label="Add reference" hidden>
                                <span class="flow-plus-icon" aria-hidden="true">+</span>
                            </button>
                            <button id="btnClearVideoRefs" type="button" class="ghost-hidden" hidden>Clear</button>
                            <button id="btnAddVideoRefSelected" type="button" class="ghost-hidden">Add Selected</button>
                        </div>
                        <div id="videoRefsList" class="flow-ref-strip" tabindex="0"></div>
                    </section>

                    <section id="imageRefsBlock" class="flow-inline-block" hidden>
                        <div class="flow-inline-actions ghost-hidden" hidden>
                            <button id="btnOpenImageShotPicker" type="button" class="flow-plus-btn ghost-hidden" aria-label="Add reference" hidden>
                                <span class="flow-plus-icon" aria-hidden="true">+</span>
                            </button>
                            <button id="btnClearRefs" type="button" class="ghost-hidden" hidden>Clear</button>
                            <button id="btnAddSelectedShotToRefs" type="button" class="ghost-hidden">Add Selected</button>
                            <button id="btnAddRefs" type="button" class="ghost-hidden">Add Files</button>
                        </div>
                        <input id="refsFileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple hidden>
                        <div id="refsList" class="flow-ref-strip" tabindex="0"></div>
                    </section>

                    <label for="promptInput" class="flow-label">What do you want to create?</label>
                    <textarea id="promptInput" rows="3" placeholder="Describe your request."></textarea>
                    <textarea id="imagePromptInput" rows="3" class="ghost-hidden" placeholder="Describe your image request."></textarea>

                    <div class="flow-composer-bottom">
                        <button id="btnVideoFlowOptions" type="button" class="flow-summary-btn">Video | Frames | x2</button>
                        <button id="btnGenerate" type="button" class="flow-go-btn" aria-label="Generate">
                            <span class="flow-go-icon" aria-hidden="true">&#8594;</span>
                        </button>
                    </div>
                    <p id="generationStatus" class="inline-status ghost-hidden" hidden>Idle.</p>
                    <p id="imageGenerationStatus" class="inline-status ghost-hidden" hidden>Idle.</p>

                    <div id="videoFlowOptions" class="flow-options-popover" hidden>
                        <div class="flow-options-grid two">
                            <button id="btnGenTypeImage" type="button" class="mode-tab-btn" data-gen-type="image">
                                <span class="mode-icon icon-image" aria-hidden="true"></span>
                                <span>Image</span>
                            </button>
                            <button id="btnGenTypeVideo" type="button" class="mode-tab-btn is-active" data-gen-type="video">
                                <span class="mode-icon icon-video" aria-hidden="true"></span>
                                <span>Video</span>
                            </button>
                        </div>

                        <div id="videoModeOptionsRow" class="flow-options-grid two">
                            <button id="btnModeFrames" type="button" class="mode-tab-btn is-active" data-video-mode="frames">
                                <span class="mode-icon icon-frames" aria-hidden="true"></span>
                                <span>Frames</span>
                            </button>
                            <button id="btnModeReference" type="button" class="mode-tab-btn" data-video-mode="reference">
                                <span class="mode-icon icon-ingredients" aria-hidden="true"></span>
                                <span>Ingredients</span>
                            </button>
                        </div>

                        <div id="videoOptionsRow" class="flow-options-grid three">
                            <label class="flow-opt">
                                <span>Samples</span>
                                <select id="sampleCountSelect">
                                    <option value="1">x1</option>
                                    <option value="2" selected>x2</option>
                                    <option value="3">x3</option>
                                    <option value="4">x4</option>
                                </select>
                            </label>
                            <label class="flow-opt">
                                <span>Aspect</span>
                                <select id="aspectRatioSelect">
                                    <option value="16:9" selected>Landscape</option>
                                    <option value="9:16">Portrait</option>
                                </select>
                            </label>
                            <label class="flow-opt">
                                <span>Model</span>
                                <select id="modelSelect">
                                    <option value="veo-3.1-generate-preview">Veo 3.1</option>
                                    <option value="veo-3.1-fast-generate-preview">Veo 3.1 Fast</option>
                                    <option value="veo-3.0-generate-001">Veo 3.0</option>
                                </select>
                            </label>
                        </div>

                        <div id="imageOptionsRow" class="flow-options-grid four" hidden>
                            <label class="flow-opt">
                                <span>Samples</span>
                                <select id="imageSampleCountSelect">
                                    <option value="1" selected>x1</option>
                                    <option value="2">x2</option>
                                    <option value="3">x3</option>
                                    <option value="4">x4</option>
                                </select>
                            </label>
                            <label class="flow-opt">
                                <span>Aspect</span>
                                <select id="imageAspectRatioSelect">
                                    <option value="16:9">Landscape</option>
                                    <option value="9:16">Portrait</option>
                                    <option value="1:1" selected>Square</option>
                                </select>
                            </label>
                            <label class="flow-opt">
                                <span>Model</span>
                                <select id="imageModelSelect">
                                    <option value="gemini-3.1-flash-image-preview">Nano Banana 2</option>
                                    <option value="gemini-2.5-flash-image">Gemini 2.5 Flash Image</option>
                                </select>
                            </label>
                            <label class="flow-opt">
                                <span>Size</span>
                                <select id="imageSizeSelect">
                                    <option value="1K" selected>1K</option>
                                    <option value="2K">2K</option>
                                    <option value="4K">4K</option>
                                </select>
                            </label>
                        </div>

                        <div id="videoFlowModelLabel" class="flow-opt-model">-</div>
                        <div id="imageFlowModelLabel" class="flow-opt-model" hidden>-</div>
                    </div>

                    <button id="btnSetStart" type="button" class="ghost-hidden">Set Start</button>
                    <button id="btnSetEnd" type="button" class="ghost-hidden">Set End</button>
                    <button id="btnGenerateImage" type="button" class="ghost-hidden">Generate Image</button>
                </section>
            </div>

            <div id="videoPickerOverlay" class="flow-picker-overlay" hidden>
                <div class="flow-picker-panel card">
                    <div class="flow-picker-head">
                        <h2>Captured Frames</h2>
                        <button id="btnCloseVideoPicker" type="button">Close</button>
                    </div>
                    <div id="shotsList" class="flow-picker-grid" tabindex="0"></div>
                </div>
            </div>

            <div id="imagePickerOverlay" class="flow-picker-overlay" hidden>
                <div class="flow-picker-panel card">
                    <div class="flow-picker-head">
                        <h2>Captured Frames</h2>
                        <button id="btnCloseImagePicker" type="button">Close</button>
                    </div>
                    <div id="imageShotsList" class="flow-picker-grid" tabindex="0"></div>
                </div>
            </div>

            <div id="mediaPreviewOverlay" class="flow-picker-overlay flow-media-preview-overlay" hidden>
                <div class="flow-picker-panel flow-media-preview-panel card">
                    <div class="flow-picker-head">
                        <h2 id="mediaPreviewTitle">Media Preview</h2>
                        <div class="flow-media-preview-actions">
                            <button id="btnMediaPreviewImport" type="button">Import</button>
                            <button id="btnMediaPreviewImportComp" type="button">Import to Comp</button>
                            <button id="btnMediaPreviewCapture" type="button" title="Capture current frame">Capture</button>
                            <button id="btnMediaPreviewToFrames" type="button">To Frames</button>
                            <button id="btnMediaPreviewReveal" type="button">Reveal</button>
                            <button id="btnMediaPreviewDelete" type="button" class="is-danger">Delete</button>
                            <button id="btnCloseMediaPreview" type="button">Close</button>
                        </div>
                    </div>
                    <div class="flow-media-preview-stage">
                        <div id="mediaPreviewEmpty" class="preview-empty">No media selected.</div>
                        <video id="mediaPreviewVideo" class="flow-media-preview-video" controls preload="metadata" playsinline hidden></video>
                        <img id="mediaPreviewImage" class="flow-media-preview-image" alt="Selected media" hidden>
                    </div>
                    <div id="mediaPreviewMeta" class="preview-meta"></div>
                </div>
            </div>
        </section>

        <section id="panelImage" class="tab-panel flow-panel ghost-hidden" data-panel-kind="image" hidden>
            <div id="imagesList" class="ghost-hidden"></div>
            <div id="imagePreviewEmpty" class="ghost-hidden"></div>
            <img id="imagePreview" class="ghost-hidden" alt="">
            <div id="imagePreviewMeta" class="ghost-hidden"></div>
            <div id="imageMetaSummary" class="ghost-hidden"></div>
            <div id="imageMetaDetails" class="ghost-hidden"></div>
            <button id="btnToggleImageMetaDetails" type="button" class="ghost-hidden">Show details</button>
            <button id="btnImportImage" type="button" class="ghost-hidden">Import</button>
            <button id="btnAddImageToFrames" type="button" class="ghost-hidden">Add</button>
            <button id="btnRevealImage" type="button" class="ghost-hidden">Reveal</button>
            <button id="btnDeleteImage" type="button" class="ghost-hidden is-danger">Delete</button>
        </section>

        <div class="ghost-hidden">
            <button id="btnTabVideo" type="button">Video</button>
            <button id="btnTabImage" type="button">Image</button>
            <div id="videoPreviewEmpty"></div>
            <video id="videoPreviewPlayer"></video>
            <div id="videoPreviewMeta"></div>
            <div id="videoMetaSummary"></div>
            <div id="videoMetaDetails"></div>
            <button id="btnToggleVideoMetaDetails" type="button">Show details</button>
            <button id="btnImportVideo" type="button">Import</button>
            <button id="btnRevealVideo" type="button">Reveal</button>
            <button id="btnDeleteVideo" type="button" class="is-danger">Delete</button>
            <button id="btnImageFlowOptions" type="button">Image options</button>
            <div id="imageFlowOptions"></div>
            <div id="splitVideoColumns"></div>
            <div id="splitVideoLeftRows"></div>
            <div id="splitVideoRightRows"></div>
            <div id="splitImageColumns"></div>
            <div id="splitImageLeftTop"></div>
            <div id="splitImageLeftMid"></div>
            <div id="splitImageRightTop"></div>
            <div id="studioGridVideo"></div>
            <div id="videoLeftStackLegacy"></div>
            <div id="videoRightStack"></div>
            <div id="studioGridImage"></div>
            <div id="imageLeftStackLegacy"></div>
            <div id="imageLeftStack"></div>
            <div id="imageRightStack"></div>
        </div>

        <p id="galleryStatus" class="status-line">Ready.</p>
    </main>

    <script src="./js/csinterface-lite.js"></script>
    <script src="./js/sharedState.js"></script>
    <script src="./js/settingsStore.js"></script>
    <script src="./js/veoApi.js"></script>
    <script src="./js/gallery.js"></script>
</body>
</html>
